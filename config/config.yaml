application:
  name: AI Studio
  version: "0.1.0"

paths:
  projects: projects
  logs: logs
  cache: cache
  prompts: prompts
  schemas: schemas
  assets: assets
  templates: templates

models:
  llm:
    provider: ollama
    model: gemma4-video-agent

  image:
    provider: diffusers
    model: stabilityai/stable-diffusion-xl-base-1.0

  video:
    provider: diffusers
    model: stabilityai/stable-video-diffusion-img2vid-xt

logging:
  level: INFO